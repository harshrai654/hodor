name: Hodor Reusable Learn

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number in caller repository
        required: true
        type: string
      model:
        description: LLM model to use for feedback extraction
        required: false
        type: string
        default: anthropic/claude-sonnet-4-5-20250929
      hodor_repo:
        description: Repository containing Hodor source
        required: false
        type: string
        default: KoinX-Tech/hodor
      dry_run:
        description: "Run in dry-run mode (true/false) — shows what would be saved without writing to KB"
        required: false
        type: string
        default: "false"
      qdrant_url:
        description: Qdrant Cloud cluster URL
        required: false
        type: string
      kb_embedding_model:
        description: Optional embedding model override (default text-embedding-3-small)
        required: false
        type: string
      kb_dedup_threshold:
        description: Optional dedup threshold override (default 0.92)
        required: false
        type: string
      kb_extract_model:
        description: Optional extraction model override (e.g. openai/gpt-4o-mini)
        required: false
        type: string
    secrets:
      LLM_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      HODOR_QDRANT_API_KEY:
        required: false

permissions:
  contents: read
  packages: read
  # Needed because the learn pipeline posts a PR comment with the extracted learnings
  # (via `gh pr comment`, which uses the GraphQL `addComment` mutation).
  pull-requests: write
  issues: write
  checks: write

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      REPO_NAME: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      LLM_MODEL: ${{ inputs.model }}
      HODOR_REPO: ${{ inputs.hodor_repo }}

    steps:
      - name: Validate required API keys
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${LLM_API_KEY}" ] && [ -z "${ANTHROPIC_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "Error: no model API key found. Configure one of LLM_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY."
            exit 1
          fi

      - name: Validate Qdrant secrets
        env:
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          QDRANT_URL: ${{ inputs.qdrant_url }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "${DRY_RUN}" != "true" ]; then
            if [ -z "${HODOR_QDRANT_API_KEY}" ] || [ -z "${QDRANT_URL}" ]; then
              echo "Error: HODOR_QDRANT_API_KEY secret and qdrant_url input are required when dry_run is not enabled."
              exit 1
            fi
          fi

      - name: Run Hodor learn
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HODOR_GH_CHECKS: "1"
          HODOR_KB_ENABLED: "true"
          HODOR_QDRANT_URL: ${{ inputs.qdrant_url }}
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          HODOR_KB_WRITE_ENABLED: "true"
          HODOR_KB_EMBEDDING_MODEL: ${{ inputs.kb_embedding_model }}
          HODOR_KB_DEDUP_THRESHOLD: ${{ inputs.kb_dedup_threshold }}
          HODOR_KB_EXTRACT_MODEL: ${{ inputs.kb_extract_model }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          pr_url="https://github.com/${REPO_NAME}/pull/${PR_NUMBER}"
          HODOR_IMAGE="ghcr.io/$(echo "${HODOR_REPO}" | tr '[:upper:]' '[:lower:]'):latest"

          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          cmd=(
            "learn"
            "${pr_url}"
            "--model" "${LLM_MODEL}"
            "--verbose"
          )
          if [ "${DRY_RUN}" = "true" ]; then
            cmd+=("--dry-run")
          fi

          docker run --rm --user 0:0 \
            -e GITHUB_ACTIONS="true" \
            -e GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e GH_TOKEN="${GH_TOKEN}" \
            -e HODOR_GH_CHECKS="${HODOR_GH_CHECKS}" \
            -e HODOR_KB_ENABLED="${HODOR_KB_ENABLED}" \
            -e HODOR_QDRANT_URL="${HODOR_QDRANT_URL}" \
            -e HODOR_QDRANT_API_KEY="${HODOR_QDRANT_API_KEY}" \
            -e HODOR_KB_WRITE_ENABLED="${HODOR_KB_WRITE_ENABLED}" \
            -e HODOR_KB_EMBEDDING_MODEL="${HODOR_KB_EMBEDDING_MODEL}" \
            -e HODOR_KB_DEDUP_THRESHOLD="${HODOR_KB_DEDUP_THRESHOLD}" \
            -e HODOR_KB_EXTRACT_MODEL="${HODOR_KB_EXTRACT_MODEL}" \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            "${HODOR_IMAGE}" \
            "${cmd[@]}"
