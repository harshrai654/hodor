name: Hodor Reusable Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number in caller repository
        required: true
        type: string
      prompt:
        description: Optional custom prompt appended to Hodor base prompt
        required: false
        type: string
      model:
        description: LLM model to use
        required: false
        type: string
        default: anthropic/claude-sonnet-4-5-20250929
      hodor_repo:
        description: Repository containing Hodor source
        required: false
        type: string
        default: mr-karan/hodor
      kb_enabled:
        description: Enable Qdrant-backed knowledge base (true/false)
        required: false
        type: string
        default: "false"
      qdrant_url:
        description: Qdrant Cloud cluster URL (required when kb_enabled=true)
        required: false
        type: string
      kb_embedding_model:
        description: Optional embedding model override (default text-embedding-3-small)
        required: false
        type: string
      kb_dedup_threshold:
        description: Optional dedup threshold override (default 0.92)
        required: false
        type: string
      kb_extract_model:
        description: Optional extraction model override (e.g. openai/gpt-4o-mini)
        required: false
        type: string
    secrets:
      LLM_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      HODOR_QDRANT_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      REPO_NAME: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      LLM_MODEL: ${{ inputs.model }}
      HODOR_REPO: ${{ inputs.hodor_repo }}

    steps:
      - name: Validate required API keys
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${LLM_API_KEY}" ] && [ -z "${ANTHROPIC_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "Error: no model API key found. Configure one of LLM_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY."
            exit 1
          fi

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_json="$(gh api "/repos/${REPO_NAME}/pulls/${PR_NUMBER}")"
          is_fork="$(echo "${pr_json}" | jq -r '.head.repo.fork')"
          head_repo="$(echo "${pr_json}" | jq -r '.head.repo.full_name')"
          base_ref="$(echo "${pr_json}" | jq -r '.base.ref')"
          head_sha="$(echo "${pr_json}" | jq -r '.head.sha')"
          echo "is_fork=${is_fork}" >> "${GITHUB_OUTPUT}"
          echo "head_repo=${head_repo}" >> "${GITHUB_OUTPUT}"
          echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Fetch base branch reference
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}"

      - name: Install GitHub CLI
        run: |
          # GitHub CLI should already be available in ubuntu-latest
          gh --version

      - name: Resolve inspect main SHA
        id: inspect_sha
        run: |
          set -euo pipefail
          inspect_sha="$(git ls-remote https://github.com/Ataraxy-Labs/inspect refs/heads/main | awk '{print $1}')"
          if [ -z "${inspect_sha}" ]; then
            echo "Failed to resolve inspect main SHA"
            exit 1
          fi
          echo "sha=${inspect_sha}" >> "${GITHUB_OUTPUT}"
          echo "INSPECT_GIT_SHA=${inspect_sha}" >> "${GITHUB_ENV}"

      - name: Restore inspect binary cache
        id: inspect_bin_cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/inspect
          key: inspect-${{ runner.os }}-${{ steps.inspect_sha.outputs.sha }}

      - name: Set up Rust toolchain
        if: steps.inspect_bin_cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: steps.inspect_bin_cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build inspect CLI
        if: steps.inspect_bin_cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cargo install \
            --git https://github.com/Ataraxy-Labs/inspect \
            --rev "${INSPECT_GIT_SHA}" \
            --locked \
            --root /tmp/inspect-root \
            inspect-cli
          mkdir -p ~/.local/bin
          cp /tmp/inspect-root/bin/inspect ~/.local/bin/inspect
          chmod +x ~/.local/bin/inspect

      - name: Add inspect to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify inspect CLI
        run: |
          set -euo pipefail
          inspect -h

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone Hodor source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GH_TOKEN}" ]; then
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${HODOR_REPO}.git" /tmp/hodor
          else
            git clone "https://github.com/${HODOR_REPO}.git" /tmp/hodor
          fi

      - name: Install and build Hodor
        working-directory: /tmp/hodor
        run: |
          set -euo pipefail
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Run Hodor review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Do not rely on overriding GITHUB_* vars from workflow env.
          HODOR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HODOR_KB_ENABLED: ${{ inputs.kb_enabled }}
          HODOR_QDRANT_URL: ${{ inputs.qdrant_url }}
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          # Disable KB writes on fork PRs by default (queries still allowed).
          HODOR_KB_WRITE_ENABLED: ${{ steps.pr.outputs.is_fork == 'true' && 'false' || 'true' }}
          HODOR_KB_EMBEDDING_MODEL: ${{ inputs.kb_embedding_model }}
          HODOR_KB_DEDUP_THRESHOLD: ${{ inputs.kb_dedup_threshold }}
          HODOR_KB_EXTRACT_MODEL: ${{ inputs.kb_extract_model }}
          CUSTOM_PROMPT: ${{ inputs.prompt }}
        run: |
          set -euo pipefail
          cd /tmp/hodor
          pr_url="https://github.com/${REPO_NAME}/pull/${PR_NUMBER}"
          args=(
            "dist/cli.js"
            "${pr_url}"
            "--model" "${LLM_MODEL}"
            "--post"
            "--verbose"
          )
          if [ -n "${CUSTOM_PROMPT}" ]; then
            args+=("--prompt" "${CUSTOM_PROMPT}")
          fi
          bun run "${args[@]}"

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `⚠️ Hodor review failed. Check [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            });
