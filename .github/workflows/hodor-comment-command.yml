name: Hodor Comment Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: hodor-comment-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  parse:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      prompt: ${{ steps.parse.outputs.prompt }}
      reason: ${{ steps.parse.outputs.reason }}
    steps:
      - name: Parse slash command and authorize actor
        id: parse
        uses: actions/github-script@v7
        env:
          HODOR_ALLOWED_ASSOCIATIONS: ${{ vars.HODOR_ALLOWED_ASSOCIATIONS }}
        with:
          script: |
            const body = (context.payload.comment?.body || "").trim();
            const association = (context.payload.comment?.author_association || "").toUpperCase();
            const allowedRaw = (process.env.HODOR_ALLOWED_ASSOCIATIONS || "OWNER,MEMBER,COLLABORATOR")
              .split(",")
              .map((v) => v.trim().toUpperCase())
              .filter(Boolean);
            const allowed = new Set(allowedRaw);
            const starts = body.toLowerCase().startsWith("/hodor");
            if (!starts) {
              core.setOutput("should_run", "false");
              core.setOutput("prompt", "");
              core.setOutput("reason", "not_hodor_command");
              return;
            }

            if (!allowed.has(association)) {
              core.setOutput("should_run", "false");
              core.setOutput("prompt", "");
              core.setOutput("reason", "unauthorized_actor");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.actor} only repository members/collaborators can run Hodor.`
              });
              return;
            }

            const match = body.match(/^\/hodor(?:\s+review)?(?:\s+([\s\S]*))?$/i);
            const prompt = (match?.[1] || "").trim();
            core.setOutput("should_run", "true");
            core.setOutput("prompt", prompt);
            core.setOutput("reason", "accepted");

      - name: Acknowledge accepted command
        if: ${{ steps.parse.outputs.should_run == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "eyes"
            });

  review:
    if: ${{ needs.parse.outputs.should_run == 'true' }}
    needs: [parse]
    uses: ./.github/workflows/hodor-reusable-review.yml
    with:
      pr_number: ${{ github.event.issue.number }}
      prompt: ${{ needs.parse.outputs.prompt }}
      kb_repo: ${{ vars.HODOR_KB_REPO }}
      kb_branch: ${{ vars.HODOR_KB_BRANCH || 'main' }}
      model: ${{ vars.HODOR_LLM_MODEL || 'anthropic/claude-sonnet-4-5-20250929' }}
      hodor_repo: ${{ vars.HODOR_SOURCE_REPO || 'mr-karan/hodor' }}
    secrets: inherit
