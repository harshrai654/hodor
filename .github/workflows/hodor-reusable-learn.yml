name: Hodor Reusable Learn

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number in caller repository
        required: true
        type: string
      model:
        description: LLM model to use for feedback extraction
        required: false
        type: string
        default: anthropic/claude-sonnet-4-5-20250929
      hodor_repo:
        description: Repository containing Hodor source
        required: false
        type: string
        default: mr-karan/hodor
      dry_run:
        description: "Run in dry-run mode (true/false) — shows what would be saved without writing to KB"
        required: false
        type: string
        default: "false"
      qdrant_url:
        description: Qdrant Cloud cluster URL
        required: false
        type: string
      kb_embedding_model:
        description: Optional embedding model override (default text-embedding-3-small)
        required: false
        type: string
      kb_dedup_threshold:
        description: Optional dedup threshold override (default 0.92)
        required: false
        type: string
      kb_extract_model:
        description: Optional extraction model override (e.g. openai/gpt-4o-mini)
        required: false
        type: string
    secrets:
      LLM_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      HODOR_QDRANT_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      REPO_NAME: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      LLM_MODEL: ${{ inputs.model }}
      HODOR_REPO: ${{ inputs.hodor_repo }}

    steps:
      - name: Validate required API keys
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${LLM_API_KEY}" ] && [ -z "${ANTHROPIC_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "Error: no model API key found. Configure one of LLM_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY."
            exit 1
          fi

      - name: Validate Qdrant secrets
        env:
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          QDRANT_URL: ${{ inputs.qdrant_url }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "${DRY_RUN}" != "true" ]; then
            if [ -z "${HODOR_QDRANT_API_KEY}" ] || [ -z "${QDRANT_URL}" ]; then
              echo "Error: HODOR_QDRANT_API_KEY secret and qdrant_url input are required when dry_run is not enabled."
              exit 1
            fi
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone Hodor source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GH_TOKEN}" ]; then
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${HODOR_REPO}.git" /tmp/hodor
          else
            git clone "https://github.com/${HODOR_REPO}.git" /tmp/hodor
          fi

      - name: Install and build Hodor
        working-directory: /tmp/hodor
        run: |
          set -euo pipefail
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Run Hodor learn
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HODOR_KB_ENABLED: "true"
          HODOR_QDRANT_URL: ${{ inputs.qdrant_url }}
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          HODOR_KB_WRITE_ENABLED: "true"
          HODOR_KB_EMBEDDING_MODEL: ${{ inputs.kb_embedding_model }}
          HODOR_KB_DEDUP_THRESHOLD: ${{ inputs.kb_dedup_threshold }}
          HODOR_KB_EXTRACT_MODEL: ${{ inputs.kb_extract_model }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          cd /tmp/hodor
          pr_url="https://github.com/${REPO_NAME}/pull/${PR_NUMBER}"
          args=(
            "dist/cli.js"
            "learn"
            "${pr_url}"
            "--model" "${LLM_MODEL}"
            "--verbose"
          )
          if [ "${DRY_RUN}" = "true" ]; then
            args+=("--dry-run")
          fi
          bun run "${args[@]}"
