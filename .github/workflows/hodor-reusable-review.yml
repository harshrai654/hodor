name: Hodor Reusable Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number in caller repository
        required: true
        type: string
      prompt:
        description: Optional custom prompt appended to Hodor base prompt
        required: false
        type: string
      model:
        description: LLM model to use
        required: false
        type: string
        default: anthropic/claude-sonnet-4-5-20250929
      hodor_repo:
        description: Repository containing Hodor source
        required: false
        type: string
        default: KoinX-Tech/hodor
      kb_enabled:
        description: Enable Qdrant-backed knowledge base (true/false)
        required: false
        type: string
        default: "false"
      qdrant_url:
        description: Qdrant Cloud cluster URL (required when kb_enabled=true)
        required: false
        type: string
      kb_embedding_model:
        description: Optional embedding model override (default text-embedding-3-small)
        required: false
        type: string
      kb_dedup_threshold:
        description: Optional dedup threshold override (default 0.92)
        required: false
        type: string
      kb_extract_model:
        description: Optional extraction model override (e.g. openai/gpt-4o-mini)
        required: false
        type: string
    secrets:
      LLM_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      HODOR_QDRANT_API_KEY:
        required: false
      HODOR_GHCR_TOKEN:
        required: false

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      REPO_NAME: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      LLM_MODEL: ${{ inputs.model }}
      HODOR_REPO: ${{ inputs.hodor_repo }}

    steps:
      - name: Validate required API keys
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${LLM_API_KEY}" ] && [ -z "${ANTHROPIC_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "Error: no model API key found. Configure one of LLM_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY."
            exit 1
          fi

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_json="$(gh api "/repos/${REPO_NAME}/pulls/${PR_NUMBER}")"
          is_fork="$(echo "${pr_json}" | jq -r '.head.repo.fork')"
          head_repo="$(echo "${pr_json}" | jq -r '.head.repo.full_name')"
          base_ref="$(echo "${pr_json}" | jq -r '.base.ref')"
          head_sha="$(echo "${pr_json}" | jq -r '.head.sha')"
          echo "is_fork=${is_fork}" >> "${GITHUB_OUTPUT}"
          echo "head_repo=${head_repo}" >> "${GITHUB_OUTPUT}"
          echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Fetch base branch reference
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}"

      - name: Install GitHub CLI
        run: |
          # GitHub CLI should already be available in ubuntu-latest
          gh --version

      - name: Run Hodor review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HODOR_GHCR_TOKEN: ${{ secrets.HODOR_GHCR_TOKEN }}
          HODOR_GH_CHECKS: "1"
          # Do not rely on overriding GITHUB_* vars from workflow env.
          HODOR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HODOR_KB_ENABLED: ${{ inputs.kb_enabled }}
          HODOR_QDRANT_URL: ${{ inputs.qdrant_url }}
          HODOR_QDRANT_API_KEY: ${{ secrets.HODOR_QDRANT_API_KEY }}
          # Disable KB writes on fork PRs by default (queries still allowed).
          HODOR_KB_WRITE_ENABLED: ${{ steps.pr.outputs.is_fork == 'true' && 'false' || 'true' }}
          HODOR_KB_EMBEDDING_MODEL: ${{ inputs.kb_embedding_model }}
          HODOR_KB_DEDUP_THRESHOLD: ${{ inputs.kb_dedup_threshold }}
          HODOR_KB_EXTRACT_MODEL: ${{ inputs.kb_extract_model }}
          CUSTOM_PROMPT: ${{ inputs.prompt }}
        run: |
          set -euo pipefail
          pr_url="https://github.com/${REPO_NAME}/pull/${PR_NUMBER}"
          HODOR_IMAGE="ghcr.io/$(echo "${HODOR_REPO}" | tr '[:upper:]' '[:lower:]'):latest"

          TOKEN="${HODOR_GHCR_TOKEN:-${GITHUB_TOKEN}}"
          echo "${TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Diagnostic: confirm whether `:latest` exists and whether this token can read it.
          # 200 => tag readable, 401/403 => auth/permission, 404 => missing tag.
          HODOR_REF="$(echo "${HODOR_REPO}" | tr '[:upper:]' '[:lower:]')"
          HODOR_OWNER="${HODOR_REF%/*}"
          HODOR_NAME="${HODOR_REF#*/}"
          GHCR_STATUS="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://ghcr.io/v2/${HODOR_OWNER}/${HODOR_NAME}/manifests/latest" || true)"
          echo "GHCR manifest status for ${HODOR_OWNER}/${HODOR_NAME}:latest => ${GHCR_STATUS}"

          cmd=(
            "${pr_url}"
            "--model" "${LLM_MODEL}"
            "--post"
            "--verbose"
          )
          if [ -n "${CUSTOM_PROMPT}" ]; then
            cmd+=("--prompt" "${CUSTOM_PROMPT}")
          fi

          docker run --rm --user 0:0 \
            -e GITHUB_ACTIONS="true" \
            -e GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e GH_TOKEN="${GH_TOKEN}" \
            -e HODOR_GH_CHECKS="${HODOR_GH_CHECKS}" \
            -e HODOR_BASE_REF="${HODOR_BASE_REF}" \
            -e HODOR_KB_ENABLED="${HODOR_KB_ENABLED}" \
            -e HODOR_QDRANT_URL="${HODOR_QDRANT_URL}" \
            -e HODOR_QDRANT_API_KEY="${HODOR_QDRANT_API_KEY}" \
            -e HODOR_KB_WRITE_ENABLED="${HODOR_KB_WRITE_ENABLED}" \
            -e HODOR_KB_EMBEDDING_MODEL="${HODOR_KB_EMBEDDING_MODEL}" \
            -e HODOR_KB_DEDUP_THRESHOLD="${HODOR_KB_DEDUP_THRESHOLD}" \
            -e HODOR_KB_EXTRACT_MODEL="${HODOR_KB_EXTRACT_MODEL}" \
            -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            -e LLM_API_KEY="${LLM_API_KEY}" \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            "${HODOR_IMAGE}" \
            "${cmd[@]}"

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `⚠️ Hodor review failed. Check [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            });
