# Hodor Learn on PR Merge
#
# Paste this workflow into your repository at .github/workflows/hodor-learn-on-merge.yml
# When a PR is merged, it runs `hodor learn` to extract durable learnings from
# human feedback left on Hodor's review comment, and saves them to the knowledge base.
#
# Prerequisites:
#   - Hodor must have posted a review on the PR (identified by "Review generated by Hodor" footer)
#   - Human feedback comments must exist after Hodor's review
#   - Required secrets: at least one LLM API key + HODOR_QDRANT_API_KEY
#   - Required vars: HODOR_QDRANT_URL
#
# If no Hodor review or no feedback comments are found, the workflow exits gracefully.

name: Hodor Learn on Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: hodor-learn-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  learn:
    if: github.event.pull_request.merged == true
    uses: KoinX-Tech/hodor/.github/workflows/hodor-reusable-learn.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      model: ${{ vars.HODOR_KB_EXTRACT_MODEL || 'openai/gpt-5' }}
      hodor_repo: ${{ vars.HODOR_SOURCE_REPO || 'KoinX-Tech/hodor' }}
      qdrant_url: ${{ vars.HODOR_QDRANT_URL }}
      kb_embedding_model: ${{ vars.HODOR_KB_EMBEDDING_MODEL }}
      kb_dedup_threshold: ${{ vars.HODOR_KB_DEDUP_THRESHOLD }}
      kb_extract_model: ${{ vars.HODOR_KB_EXTRACT_MODEL }}
    secrets: inherit
